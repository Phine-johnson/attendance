<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Redemption Presby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=6">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <div class="d-flex align-items-center">
                <div class="d-flex align-items-center">
                    <div class="logo-img d-flex align-items-center justify-content-center">
                        <img src="{{ url_for('static', filename='presby-logo.png') }}?v=3" alt="PCG Logo" style="max-width: 70%; max-height: 70%;">
                    </div>
                    <div>
                        <div class="church-name">Redemption Presby</div>
                        <div class="church-subtitle">Congregation</div>
                    </div>
                </div>
            </div>
            <div class="ms-auto d-flex align-items-center">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-custom text-center">
                    <div class="card-body py-5">
                        <svg width="64" height="64" class="mb-3 text-danger" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <h3 class="text-pcg-blue">Error</h3>
                        <p class="text-muted">{{ message }}</p>
                        <a href="javascript:history.back()" class="btn btn-custom-primary">Go Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
