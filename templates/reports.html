<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Reports - Redemption Presby Congregation</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=7">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <div class="d-flex align-items-center">
                <button class="hamburger-btn me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
                </button>
                <div class="d-flex align-items-center">
                    <div class="logo-img d-flex align-items-center justify-content-center"><img src="{{ url_for('static', filename='presby-logo.png') }}?v=3" alt="Logo"></div>
                    <div><div class="church-name">Redemption Presby</div><div class="church-subtitle">Congregation</div></div>
                </div>
            </div>
            <div class="ms-auto d-flex align-items-center">
                <span class="navbar-text me-3">Welcome, <strong>{{ user }}</strong></span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Sign Out</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h2 class="text-pcg-blue fw-bold mb-1" style="font-family: 'Playfair Display', serif;">Custom Report Builder</h2>
                        <div class="divider-custom" style="width: 100%; margin: 0 0 1rem 0;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-custom h-100">
                    <div class="card-header"><h5 class="text-pcg-blue mb-0">Report Templates</h5></div>
                    <div class="card-body">
                        <div class="list-group list-group-flush">
                            <button class="list-group-item list-group-item-action report-template" data-type="membership">
                                <h6 class="mb-1">Membership Summary</h6>
                                <p class="mb-1 small text-muted">Active vs Inactive members</p>
                            </button>
                            <button class="list-group-item list-group-item-action report-template" data-type="attendance">
                                <h6 class="mb-1">Attendance Report</h6>
                                <p class="mb-1 small text-muted">Total attendance statistics</p>
                            </button>
                            <button class="list-group-item list-group-item-action report-template" data-type="financial">
                                <h6 class="mb-1">Financial Summary</h6>
                                <p class="mb-1 small text-muted">Donations and giving trends</p>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card card-custom">
                    <div class="card-header">
                        <h5 class="text-pcg-blue mb-0">Generate Report</h5>
                    </div>
                    <div class="card-body">
                        <form id="reportForm">
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-pcg-blue">Report Type</label>
                                    <select class="form-select form-control-custom" id="reportType" name="type" required>
                                        <option value="">Select type...</option>
                                        <option value="membership">Membership Summary</option>
                                        <option value="attendance">Attendance Report</option>
                                        <option value="financial">Financial Summary</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-pcg-blue">Start Date</label>
                                    <input type="date" class="form-control form-control-custom" name="start" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-pcg-blue">End Date</label>
                                    <input type="date" class="form-control form-control-custom" name="end" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-custom-primary">
                                <svg width="18" height="18" class="me-1" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                                Generate Report
                            </button>
                        </form>
                        <hr>
                        <div id="reportResult" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="card card-custom">
                    <div class="card-header"><h5 class="text-pcg-blue mb-0">Report Preview</h5></div>
                    <div class="card-body">
                        <canvas id="reportChart" height="100"></canvas>
                        <div id="reportTable" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarOffcanvas">
        <div class="offcanvas-header"><h5 class="offcanvas-title">Menu</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body p-0"><nav class="navbar-dark">
            <div class="sidebar-item" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</div>
            <div class="sidebar-item" onclick="location.href='{{ url_for('donations') }}'">Donations</div>
            <div class="sidebar-item" onclick="location.href='{{ url_for('donation_reports') }}'">Donation Reports</div>
            <div class="sidebar-item sidebar-highlight" onclick="location.href='{{ url_for('reports') }}'">Custom Reports</div>
            <div class="sidebar-item" onclick="location.href='{{ url_for('communications') }}'">Communications</div>
        </nav></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script>
        let reportChart = null;
        document.querySelectorAll('.report-template').forEach(btn => {
            btn.addEventListener('click', function() {
                document.getElementById('reportType').value = this.dataset.type;
                this.classList.add('active');
                document.querySelectorAll('.report-template').forEach(b => { if(b !== this) b.classList.remove('active'); });
            });
        });
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {};
            formData.forEach((v,k) => data[k] = v);
            fetch('/api/reports/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
                .then(r => r.json())
                .then(d => {
                    const resultDiv = document.getElementById('reportResult');
                    let html = '<div class="alert alert-success"><h6>Report Generated</h6><pre class="mb-0">' + JSON.stringify(d.data, null, 2) + '</pre></div>';
                    resultDiv.innerHTML = html;
                    
                    const ctx = document.getElementById('reportChart').getContext('2d');
                    if (reportChart) reportChart.destroy();
                    
                    let labels = [], values = [];
                    if (d.type === 'membership') {
                        labels = ['Active', 'Inactive'];
                        values = [d.data.active || 0, d.data.inactive || 0];
                    } else if (d.type === 'financial') {
                        labels = ['Total Donations'];
                        values = [d.data.total_donations || 0];
                    }
                    reportChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: d.type,
                                data: values,
                                backgroundColor: ['#00A651', '#3c8dbc', '#f39c12']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                });
        });
        // Set default dates
        const today = new Date().toISOString().split('T')[0];
        const lastMonth = new Date();
        lastMonth.setMonth(lastMonth.getMonth() - 1);
        const lastMonthStr = lastMonth.toISOString().split('T')[0];
        document.querySelector('input[name="start"]').value = lastMonthStr;
        document.querySelector('input[name="end"]').value = today;
    </script>
</body>
</html>
