<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Check-in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #002192 0%, #006333 100%); min-height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-control:focus { border-color: #D4AF37; box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25); }
        .btn-submit { background: #006333; border: none; }
        .btn-submit:hover { background: #004d26; }
        .status-badge { font-size: 0.9rem; padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <img src="{{ url_for('static', filename='presby-logo.png') }}" alt="Logo" style="width: 60px; height: 60px;">
                            <h3 class="text-pcg-blue mt-2">Attendance Check-in</h3>
                            <p class="text-muted">Please confirm your details</p>
                        </div>
                        
                        <form id="checkinForm">
                            <input type="hidden" id="sessionId" value="{{ session_id }}">
                            <input type="hidden" id="limit" value="{{ limit }}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-pcg-blue">Full Name</label>
                                <input type="text" class="form-control" id="memberName" placeholder="Enter your name" required>
                            </div>
                            
                             <div class="mb-3">
                                 <label class="form-label fw-bold text-pcg-blue">Category</label>
                                 <select class="form-select" id="memberCategory">
                                     <option value="Member">Member</option>
                                     <option value="Children Service">Children Service</option>
                                     <option value="YPG">YPG</option>
                                     <option value="JY">JY</option>
                                     <option value="YAF">YAF</option>
                                     <option value="Men's Fellowship">Men's Fellowship</option>
                                     <option value="Women's Fellowship">Women's Fellowship</option>
                                     <option value="Church Choir">Church Choir</option>
                                     <option value="Singing Band">Singing Band</option>
                                     <option value="Usher">Usher</option>
                                     <option value="Visit">Visit</option>
                                     <option value="Guest">Guest</option>
                                 </select>
                             </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-pcg-blue">Time</label>
                                <input type="text" class="form-control" id="checkinTime" readonly>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-pcg-blue">Status</label>
                                <div>
                                    <span class="badge bg-success status-badge" id="checkinStatus">Ready to Check In</span>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-submit text-white w-100 py-2">Confirm Attendance</button>
                        </form>
                        
                        <div id="successMessage" class="text-center mt-4 d-none">
                            <svg width="64" height="64" fill="#006333" viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                            </svg>
                            <h4 class="text-success mt-3">Attendance Recorded!</h4>
                            <p class="text-muted">Thank you for checking in.</p>
                        </div>
                        
                        <div id="errorMessage" class="text-center mt-4 d-none">
                            <svg width="64" height="64" fill="#dc3545" viewBox="0 0 24 24">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                            <h4 class="text-danger mt-3" id="errorText">Error</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
     <script>
        const sessionId = document.getElementById('sessionId').value;
        const proximityLimit = parseFloat(document.getElementById('limit').value) || 3;
        let memberLatitude = null;
        let memberLongitude = null;
        
        // Set current time
        function updateTime() {
            const now = new Date();
            document.getElementById('checkinTime').value = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // Get member's actual location
        function getLocation() {
            const statusEl = document.getElementById('checkinStatus');
            statusEl.textContent = 'Getting location...';
            statusEl.className = 'badge bg-warning status-badge';
            
            if (!navigator.geolocation) {
                statusEl.textContent = 'Geolocation not supported';
                statusEl.className = 'badge bg-danger status-badge';
                return false;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    memberLatitude = position.coords.latitude;
                    memberLongitude = position.coords.longitude;
                    statusEl.textContent = 'Location obtained - Ready to check in';
                    statusEl.className = 'badge bg-success status-badge';
                },
                (error) => {
                    let msg = 'Location access denied';
                    switch(error.code) {
                        case error.PERMISSION_DENIED: msg = 'Location access denied'; break;
                        case error.POSITION_UNAVAILABLE: msg = 'Location unavailable'; break;
                        case error.TIMEOUT: msg = 'Location request timeout'; break;
                    }
                    statusEl.textContent = msg;
                    statusEl.className = 'badge bg-danger status-badge';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
            return true;
        }
        
        // Attempt to get location on page load
        getLocation();
        
        // Handle form submission
        document.getElementById('checkinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (memberLatitude === null || memberLongitude === null) {
                document.getElementById('errorText').textContent = 'Waiting for location. Please allow location access and try again.';
                document.getElementById('errorMessage').classList.remove('d-none');
                return;
            }
            
            const data = {
                session_id: sessionId,
                latitude: memberLatitude,
                longitude: memberLongitude,
                name: document.getElementById('memberName').value,
                member_type: document.getElementById('memberCategory').value
            };
            
            try {
                const response = await fetch('/api/attendance/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success || response.ok) {
                    document.getElementById('checkinForm').classList.add('d-none');
                    document.getElementById('successMessage').classList.remove('d-none');
                } else {
                    document.getElementById('errorText').textContent = result.error || 'Check-in failed';
                    document.getElementById('errorMessage').classList.remove('d-none');
                }
            } catch (error) {
                document.getElementById('errorText').textContent = 'Network error. Please try again.';
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
