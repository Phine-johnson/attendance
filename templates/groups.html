<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups - Redemption Presby Congregation</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=6">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <div class="d-flex align-items-center">
                <button class="hamburger-btn me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas" title="Open Menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <div class="d-flex align-items-center">
                    <div class="logo-img d-flex align-items-center justify-content-center">
                        <img src="{{ url_for('static', filename='presby-logo.png') }}?v=3" alt="PCG Logo" style="max-width: 70%; max-height: 70%;">
                    </div>
                    <div>
                        <div class="church-name">Redemption Presby</div>
                        <div class="church-subtitle">Congregation</div>
                    </div>
                </div>
            </div>
            <div class="ms-auto d-flex align-items-center">
                <span class="navbar-text me-3">Welcome, <strong>{{ user }}</strong></span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="text-pcg-blue fw-bold mb-1" style="font-family: 'Playfair Display', serif;">
                            Small Groups
                        </h2>
                        <div class="divider-custom" style="width: 100%; margin: 0 0 1rem 0;"></div>
                    </div>
                    <button class="btn btn-custom-primary" data-bs-toggle="modal" data-bs-target="#createGroupModal">
                        <svg width="18" height="18" class="me-1" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        Create Group
                    </button>
                </div>
            </div>
        </div>

        <!-- Groups List -->
        <div class="row" id="groupsContainer">
            <!-- Groups will be loaded dynamically -->
        </div>
    </div>

    <!-- Create Group Modal -->
    <div class="modal fade" id="createGroupModal" tabindex="-1" aria-labelledby="createGroupModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-pcg-blue" id="createGroupModalLabel">Create New Group</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="createGroupForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Group Name</label>
                            <input type="text" class="form-control form-control-custom" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Description</label>
                            <textarea class="form-control form-control-custom" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Category</label>
                            <select class="form-select form-control-custom" name="category" required>
                                <option value="fellowship">Fellowship</option>
                                <option value="study">Bible Study</option>
                                <option value="prayer">Prayer</option>
                                <option value="service">Service</option>
                                <option value="youth">Youth</option>
                                <option value="men">Men's</option>
                                <option value="women">Women's</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Group Leader</label>
                            <select class="form-select form-control-custom" name="leaderId">
                                <option value="">Select Leader (optional)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Meeting Day</label>
                            <select class="form-select form-control-custom" name="meetingDay" required>
                                <option value="sunday">Sunday</option>
                                <option value="monday">Monday</option>
                                <option value="tuesday">Tuesday</option>
                                <option value="wednesday">Wednesday</option>
                                <option value="thursday">Thursday</option>
                                <option value="friday">Friday</option>
                                <option value="saturday">Saturday</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Meeting Time</label>
                            <input type="time" class="form-control form-control-custom" name="meetingTime" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-custom-primary">Create Group</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Member to Group Modal -->
    <div class="modal fade" id="addMemberGroupModal" tabindex="-1" aria-labelledby="addMemberGroupModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-pcg-blue" id="addMemberGroupModalLabel">Add Member to Group</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addGroupMemberForm">
                    <input type="hidden" name="group_id" id="groupSelectId">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-pcg-blue">Member</label>
                            <select class="form-select form-control-custom" name="member_id" id="memberSelect" required>
                                <option value="">Select Member</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-custom-primary">Add to Group</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Offcanvas Sidebar -->
    <div class="offcanvas offcanvas-end bg-dark" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="sidebarOffcanvasLabel">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <nav class="navbar-dark">
                <div class="sidebar-item" data-href="{{ url_for('dashboard') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    Dashboard
                </div>
                <div class="sidebar-item" data-href="{{ url_for('members_list') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.76 0-8 1.34-8 4v3h16v-3c0-2.66-5.24-4-8-4z"/>
                    </svg>
                    Members
                </div>
                <div class="sidebar-item" data-href="{{ url_for('attendance_report') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H8v-2h4v2zm0-4H8v-2h4v2zm0-4H8V6h4v2zm5 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V6h2v2z"/>
                    </svg>
                    Attendance
                </div>
                <div class="sidebar-item" data-href="{{ url_for('events_list') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V9h14v10z"/>
                    </svg>
                    Events
                </div>
                <div class="sidebar-item sidebar-highlight" data-href="{{ url_for('groups_list') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.76 0-8 1.34-8 4v3h16v-3c0-2.66-5.24-4-8-4z"/>
                    </svg>
                    Groups
                </div>
                <div class="sidebar-item" data-href="{{ url_for('donations_page') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 14.59L12 11.17l-1.41 4.59L7.82 14l4.59-.61-.61-4.59 1.41 4.59L16.18 14z"/>
                    </svg>
                    Donations
                </div>
                <div class="sidebar-item" data-href="{{ url_for('communications_page') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                    </svg>
                    Communications
                </div>
                <div class="sidebar-item" data-href="{{ url_for('sermons_page') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                    </svg>
                    Sermons
                </div>
                <div class="sidebar-item" data-href="{{ url_for('volunteers_page') }}">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    Volunteers
                </div>
                <div class="sidebar-divider"></div>
                <a href="{{ url_for('logout') }}" class="sidebar-logout sidebar-item">
                    <svg width="20" height="20" class="me-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3H4c-1.1 0-2 .9-2 2v4h2V5h16v14H4v-4H2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                    Sign Out
                </a>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let allGroups = [];
            let allMembers = [];

            // Load groups and members
            async function loadData() {
                try {
                    const [groupsRes, membersRes] = await Promise.all([
                        fetch('/api/groups'),
                        fetch('/api/members')
                    ]);

                    if (groupsRes.ok) {
                        const data = await groupsRes.json();
                        allGroups = data.groups || [];
                    }
                    if (membersRes.ok) {
                        const data = await membersRes.json();
                        allMembers = data.members || [];
                    }

                    renderGroups();
                    populateLeaderSelect();
                    populateMemberSelect();
                } catch (error) {
                    console.error('Error loading data:', error);
                    // Fallback to server-side rendered data
                    allGroups = {{ groups|tojson }} || [];
                    allMembers = {{ members|tojson }} || [];
                    renderGroups();
                    populateLeaderSelect();
                    populateMemberSelect();
                }
            }

            function renderGroups() {
                const container = document.getElementById('groupsContainer');
                container.innerHTML = '';

                if (allGroups.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center text-muted py-5"><p>No groups created yet.</p></div>';
                    return;
                }

                allGroups.forEach(group => {
                    const col = document.createElement('div');
                    col.className = 'col-lg-4 col-md-6 mb-4';

                    const meetingDay = group.meeting_day || 'TBD';
                    const meetingTime = group.meeting_time ? formatTime(group.meeting_time) : 'TBA';
                    const memberCount = group.members ? Object.keys(group.members).length : 0;
                    const leader = group.leader_id ? allMembers.find(m => m.id === group.leader_id) : null;

                    col.innerHTML = `
                        <div class="card card-custom h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="text-pcg-blue mb-0">${group.name}</h5>
                                    <div class="btn-group">
                                        <button class="btn btn-sm btn-outline-primary edit-group-btn" data-id="${group.id}" title="Edit">
                                            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger delete-group-btn" data-id="${group.id}" data-name="${group.name}" title="Delete">
                                            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-12H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <p class="text-muted small mb-2">${group.description || 'No description'}</p>
                                <p class="mb-1"><strong>Members:</strong> <span class="member-count">${memberCount}</span></p>
                                <p class="mb-1"><strong>Meeting:</strong> ${capitalize(meetingDay)} at ${meetingTime}</p>
                                ${leader ? `<p class="mb-1"><strong>Leader:</strong> ${leader.first_name} ${leader.last_name}</p>` : ''}
                                        <button class="btn btn-sm btn-outline-primary mt-2 toggle-members-btn" data-id="${group.id}" type="button">
                                            View Members (${memberCount})
                                        </button>
                                        <button class="btn btn-sm btn-outline-success mt-2 add-member-btn ms-1" data-id="${group.id}" type="button">
                                            + Add Member
                                        </button>
                                        <div class="collapse mt-2 group-members-list" id="members-${group.id}">
                                            <ul class="list-unstyled small">
                                                ${group.members ? Object.keys(group.members).map(mid => {
                                                    const m = allMembers.find(member => member.id === mid);
                                                    return m ? `<li>${m.first_name} ${m.last_name}</li>` : '';
                                                }).join('') : '<li class="text-muted">No members yet</li>'}
                                            </ul>
                                        </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                });

                // Toggle members collapse
                document.querySelectorAll('.toggle-members-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const target = document.getElementById(`members-${this.dataset.id}`);
                        const bsCollapse = new bootstrap.Collapse(target, { toggle: true });
                        const count = allGroups.find(g => g.id === this.dataset.id).members ? Object.keys(allGroups.find(g => g.id === this.dataset.id).members).length : 0;
                        this.textContent = target.classList.contains('show') ? 'Hide Members' : `View Members (${count})`;
                    });
                });

                // Add member to group
                document.querySelectorAll('.add-member-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const groupId = this.dataset.id;
                        document.getElementById('groupSelectId').value = groupId;
                        new bootstrap.Modal(document.getElementById('addMemberGroupModal')).show();
                    });
                });

                // Edit/Delete buttons
                document.querySelectorAll('.edit-group-btn').forEach(btn => {
                    btn.addEventListener('click', () => openEditModal(btn.dataset.id));
                });
                document.querySelectorAll('.delete-group-btn').forEach(btn => {
                    btn.addEventListener('click', () => openDeleteModal(btn.dataset.id, btn.dataset.name));
                });
            }

            function populateLeaderSelect() {
                const select = document.querySelector('#createGroupForm select[name="leaderId"]');
                select.innerHTML = '<option value="">Select Leader (optional)</option>';
                allMembers.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.first_name} ${m.last_name}`;
                    select.appendChild(opt);
                });
            }

            function populateMemberSelect() {
                const select = document.getElementById('memberSelect');
                select.innerHTML = '<option value="">Select Member</option>';
                allMembers.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.first_name} ${m.last_name}`;
                    select.appendChild(opt);
                });
            }

            function formatTime(time) {
                if (!time) return 'TBA';
                const [h, m] = time.split(':');
                const hour = parseInt(h);
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const displayHour = hour % 12 || 12;
                return `${displayHour}:${m} ${ampm}`;
            }

            function capitalize(s) {
                return s.charAt(0).toUpperCase() + s.slice(1);
            }

            // Create/Edit Group
            let editingGroupId = null;

            document.getElementById('createGroupForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());

                const isEdit = editingGroupId !== null;
                const url = isEdit ? `/api/groups/${editingGroupId}` : '/api/groups';
                const method = isEdit ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('createGroupModal')).hide();
                        editingGroupId = null;
                        loadData();
                        e.target.reset();
                    } else {
                        alert(isEdit ? 'Failed to update group' : 'Failed to create group');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });

            // Edit Group
            async function openEditModal(groupId) {
                const group = allGroups.find(g => g.id === groupId);
                if (!group) return;

                editingGroupId = groupId;
                // Prefill create modal
                document.querySelector('#createGroupForm input[name="name"]').value = group.name || '';
                document.querySelector('#createGroupForm textarea[name="description"]').value = group.description || '';
                document.querySelector('#createGroupForm select[name="category"]').value = group.category || 'fellowship';
                document.querySelector('#createGroupForm select[name="leaderId"]').value = group.leader_id || '';
                document.querySelector('#createGroupForm select[name="meetingDay"]').value = group.meeting_day || 'sunday';
                document.querySelector('#createGroupForm input[name="meetingTime"]').value = group.meeting_time || '';

                // Change modal title to indicate edit
                document.getElementById('createGroupModalLabel').textContent = 'Edit Group';

                new bootstrap.Modal(document.getElementById('createGroupModal')).show();
            }

            // Reset modal title and editing state when modal is hidden
            document.getElementById('createGroupModal').addEventListener('hidden.bs.modal', function () {
                editingGroupId = null;
                document.getElementById('createGroupForm').reset();
                document.getElementById('createGroupModalLabel').textContent = 'Create New Group';
            });

            // Delete Group
            let deleteGroupId = null;
            function openDeleteModal(groupId, groupName) {
                deleteGroupId = groupId;
                document.getElementById('deleteEventName').textContent = groupName;
                new bootstrap.Modal(document.getElementById('deleteModal')).show();
            }

            document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
                if (!deleteGroupId) return;
                try {
                    const response = await fetch(`/api/groups/${deleteGroupId}`, { method: 'DELETE' });
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                        loadData();
                        deleteGroupId = null;
                    } else {
                        alert('Failed to delete group');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });

            // Add Member to Group
            document.getElementById('addGroupMemberForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const groupId = document.getElementById('groupSelectId').value;
                const formData = new FormData(e.target);
                const memberId = formData.get('member_id');

                try {
                    const response = await fetch(`/api/groups/${groupId}/members`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ member_id: memberId })
                    });
                    if (response.ok) {
                        bootstrap.Modal.getInstance(document.getElementById('addMemberGroupModal')).hide();
                        loadData();
                        e.target.reset();
                    } else {
                        alert('Failed to add member to group');
                    }
             } catch (error) {
                 console.error('Error:', error);
             }
         });

         // Reset add member modal on hide
         document.getElementById('addMemberGroupModal').addEventListener('hidden.bs.modal', function () {
             document.getElementById('groupSelectId').value = '';
             document.getElementById('addGroupMemberForm').reset();
         });

          loadData();

          // Sidebar navigation via data-href attributes
          const sidebarItems = document.querySelectorAll('.sidebar-item[data-href]');
          sidebarItems.forEach(item => {
              item.addEventListener('click', function() {
                  const href = this.dataset.href;
                  if (href) window.location.href = href;
              });
          });
        });
    </script>
</body>
</html>
