<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Redemption Presby Congregation</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=7">
</head>
<body class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="church-logo-container">
                <img src="{{ url_for('static', filename='presby-logo.png') }}?v=3" alt="Redemption Presby Congregation Logo">
            </div>
            <h2>Redemption Presby</h2>
            <p>Congregation</p>
            <p class="subtitle">Attendance Administration</p>
        </div>

        {% if error %}
            <div class="alert alert-danger-custom alert-custom" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control form-control-custom" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-custom" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">Sign In</button>
        </form>

        <div class="footer-text">
            <p class="mb-0">© 2026 Redemption Presby Congregation</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
