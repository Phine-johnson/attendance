<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Redemption Presby Congregation</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=4">
</head>
<body class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="church-logo-container">
                <img src="{{ url_for('static', filename='presby-logo.png') }}?v=3" alt="Redemption Presby Congregation Logo">
            </div>
            <h2>Redemption Presby</h2>
            <p>Congregation</p>
            <p class="subtitle">Attendance Administration</p>
        </div>

        {% if error %}
            <div class="alert alert-danger-custom alert-custom" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control form-control-custom" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-custom" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">Sign In</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" class="text-muted small" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
                Forgot Password?
            </a>
        </div>

        <div class="footer-text">
            <p class="mb-0">© 2026 Redemption Presby Congregation</p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <label for="resetEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-custom" id="resetEmail" name="email" required>
                        </div>
                        <div id="forgotPasswordMessage" class="mb-3" style="display: none;"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="forgotPasswordForm" class="btn btn-primary-custom">Send Reset Link</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const messageEl = document.getElementById('forgotPasswordMessage');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.style.display = 'block';
                    messageEl.className = 'alert alert-success-custom mb-3';
                    messageEl.textContent = data.message || 'Password reset link sent to your email.';
                    this.reset();
                } else {
                    messageEl.style.display = 'block';
                    messageEl.className = 'alert alert-danger-custom mb-3';
                    messageEl.textContent = data.error || 'Failed to send reset link.';
                }
            } catch (error) {
                messageEl.style.display = 'block';
                messageEl.className = 'alert alert-danger-custom mb-3';
                messageEl.textContent = 'Network error. Please try again.';
            }
        });

        // Pre-fill email from login form if modal opened
        document.getElementById('forgotPasswordModal').addEventListener('show.bs.modal', function() {
            const loginEmail = document.getElementById('email').value;
            if (loginEmail) {
                document.getElementById('resetEmail').value = loginEmail;
            }
        });
    </script>
</body>
</html>
